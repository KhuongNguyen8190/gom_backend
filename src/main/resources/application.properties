# ==============================================================
# CẤU HÌNH PORT & DATABASE ĐỘNG
# ==============================================================
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gom_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}

# ==============================================================
# GIỚI HẠN KẾT NỐI (Khắc phục lỗi FATAL của Aiven Free Tier)
# ==============================================================
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# ==============================================================
# CẤU HÌNH HIBERNATE & JPA
# ==============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true